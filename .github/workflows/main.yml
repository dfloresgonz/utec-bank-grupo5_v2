name: Deployment Workflow

on:
  push:
    branches:
      - mainx
      - develop
  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_project: smiledu
    steps:
      - name: Show environment info
        run: |
          BRANCH="${GITHUB_REF_NAME:-$(echo ${GITHUB_REF#refs/heads/})}"
          if [ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ] && [ "$BRANCH" == "main" ]; then
            echo "🚫 workflow_dispatch no está permitido en la rama 'main'"
            exit 1
          fi

          # Detectar entorno
          if [ "$BRANCH" == "main" ]; then
            ENV_LOWER="prod"
          else
            ENV_LOWER="test"
          fi
          ENV_UPPER=$(echo "$ENV_LOWER" | tr '[:lower:]' '[:upper:]')

          echo "TF_VAR_env=$ENV_LOWER" >> $GITHUB_ENV
          echo "ENV_UPPER=$ENV_UPPER" >> $GITHUB_ENV
          echo "TF_VAR_aws_region=$AWS_DEFAULT_REGION" >> $GITHUB_ENV

      - name: Prevent manual run on main
        if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
        run: |
          echo "🚫 workflow_dispatch no está permitido en la rama 'main'"
          exit 1

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Build Lambda package
        run: |
          cd src
          pip install -r requirements.txt -t python
          cp lambda_function.py python/
          cd python
          zip -r ../lambda_function.zip .
          cd ..
          rm -rf python
        working-directory: ./  # Asegúrate de que 'src' está en la raíz del repo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Show environment info
        run: |
          echo "ENV_UPPER=$ENV_UPPER" >> $GITHUB_ENV
          if [ "$ENV_UPPER" = "PROD" ]; then
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_PROD_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_PROD_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          else
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_TEST_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_TEST_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Upload Lambda package to S3
        run: |
          aws s3 cp src/lambda_function.zip s3://s3-mlflow-artifacts-mlflow-tracking-server-grupo5-01/src/lambda_function.zip
      
      - name: Generate backend config
        run: |
          echo "bucket = \"s3-${TF_VAR_env}-${TF_VAR_project}-infra-tfstate\"" > backend.hcl
          echo "key    = \"envs/${TF_VAR_env}/mlflow-project-utec/terraform.tfstate\"" >> backend.hcl
          echo "region = \"$AWS_DEFAULT_REGION\"" >> backend.hcl
          echo "dynamodb_table = \"dyn-${TF_VAR_env}-${TF_VAR_project}-infra-tfstate-locks\"" >> backend.hcl
          echo "encrypt = true" >> backend.hcl
        working-directory: terraform
      
      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl
        working-directory: terraform
      
      - name: Terraform Plan
        run: terraform plan -input=false
        working-directory: terraform
      
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: terraform